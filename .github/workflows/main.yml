name: Build Desktop Binaries (Win/Linux/macOS)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

env:
  APP_VERSION: "0.2"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        # Linux 바이너리는 glibc 하위 호환을 위해 상대적으로 낮은 버전에서 빌드한다.
        os: [windows-latest, ubuntu-22.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tk tcl

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow requests beautifulsoup4 yfinance pandas numpy matplotlib holidays

      - name: Build (onefile)
        run: |
          pyinstaller --noconfirm --clean --noconsole --onefile --name "portfolio-tracker-${{ env.APP_VERSION }}" --hidden-import PIL.ImageTk --hidden-import PIL._imagingtk --hidden-import matplotlib.backends.backend_tkagg --hidden-import matplotlib.backends._backend_tk run_app.py

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-tracker-${{ env.APP_VERSION }}-windows
          path: dist/portfolio-tracker-${{ env.APP_VERSION }}.exe
          if-no-files-found: error

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-tracker-${{ env.APP_VERSION }}-linux
          path: dist/portfolio-tracker-${{ env.APP_VERSION }}
          if-no-files-found: error
